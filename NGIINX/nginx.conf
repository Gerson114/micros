events {}

http {
    upstream backend {
        least_conn;

        server micros-tw7a.onrender.com;
        server micros-2-zjsb.onrender.com;
    }

    server {
        listen 80;

        location / {
            # 🔥 CORRETO: usar HTTP aqui
            proxy_pass http://backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 🔥 ESSENCIAL no Render (evita redirect 307)
            proxy_set_header X-Forwarded-Proto https;

            # 🔥 evita redirecionamento errado
            proxy_redirect off;
        }
    }
}