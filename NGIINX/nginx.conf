events {}

http {
    upstream backend {
        least_conn;
        server micros-tw7a.vercel.app:443;
        server micros-2-zjsb.vercel.app:443;
    }

    server {
        listen 443 ssl;

        # Render ou outro provedor cuida do SSL público
        ssl_certificate /etc/ssl/certs/fullchain.pem;   # se usar Render, ou pode ser omitido
        ssl_certificate_key /etc/ssl/private/privkey.pem;

        location / {
            proxy_pass https://backend;
            proxy_ssl_server_name on;    # essencial para HTTPS
            proxy_ssl_verify off;        # evita erro de certificado interno

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    server {
        listen 80;
        return 301 https://$host$request_uri;  # redireciona HTTP → HTTPS
    }
}