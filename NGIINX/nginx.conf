events {}

http {
    upstream backend {
        least_conn;  # distribui para o servidor com menos conexões

        # Backends
        server micros-tw7a.onrender.com:443;
        server micros-2-zjsb.onrender.com:443;
    }

    server {
        listen 443 ssl;

        # Certificados do Render
        ssl_certificate /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/private/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass https://backend;

            # Headers importantes para Render
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_redirect off;        # evita redirect 307
            proxy_read_timeout 90s;    # timeout para requests longos
            proxy_connect_timeout 90s; # timeout para conexão
        }
    }

    # Redireciona HTTP para HTTPS
    server {
        listen 80;
        server_name loadbalance-aw5o.onrender.com;

        return 301 https://$host$request_uri;
    }
}