name: Deploy Railway

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}

    steps:
      # 1️⃣ Pega o código do repositório
      - uses: actions/checkout@v4

      # 2️⃣ Instala a Railway CLI
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # 3️⃣ Deploy dos containers do mc1
      - name: Deploy mc1 Containers
        run: |
          MC1_CONTAINERS=("api1" "api2" "api3")
          for CONTAINER in "${MC1_CONTAINERS[@]}"; do
            echo "🚀 Deploying mc1/$CONTAINER..."
            cd sitem/mc1/$CONTAINER || { echo "❌ Directory sitem/mc1/$CONTAINER not found"; exit 1; }
            railway up --service $CONTAINER --detach
            cd - >/dev/null
          done

      # 4️⃣ Deploy do mc2
      - name: Deploy mc2
        run: |
          echo "🚀 Deploying mc2..."
          cd sitem/mc2 || { echo "❌ Directory sitem/mc2 not found"; exit 1; }
          railway up --service mc2 --detach
          cd - >/dev/null

      # 5️⃣ Deploy do Load Balancer (opcional)
      - name: Deploy Load Balancer
        run: |
          echo "🚀 Deploying load-balancer..."
          cd sitem/mc1-lb || { echo "❌ Directory sitem/mc1-lb not found"; exit 1; }
          railway up --service load-balancer --detach
          cd - >/dev/null