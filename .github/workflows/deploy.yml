name: Deploy Railway

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}

    steps:
      # 1️⃣ Pega o código do repositório
      - uses: actions/checkout@v4

      # 2️⃣ Instala Railway CLI
      - name: Install Railway CLI
        run: npm install -g railway

      # 3️⃣ Login Railway
      - name: Railway Login
        run: railway login --apiKey $RAILWAY_API_KEY

      # 4️⃣ Deploy das APIs
      - name: Deploy APIs
        run: |
          SERVICES=("mc1-api1" "mc1-api2" "mc1-api3")
          for SERVICE in "${SERVICES[@]}"; do
            echo "🚀 Deploying $SERVICE..."
            cd mc1
            railway up --service $SERVICE --detach
            cd - >/dev/null
          done

      # 5️⃣ Deploy Load Balancer (opcional)
      - name: Deploy Load Balancer
        run: |
          echo "🚀 Deploying load-balancer..."
          cd mc1-lb
          railway up --service load-balancer --detach