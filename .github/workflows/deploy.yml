name: CI

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build MC1
        run: |
          cd MC1
          go mod download
          go build -v

      - name: Build MC2
        run: |
          cd MC2
          go mod download
          go build -v

      - name: Deploy MC1 API 1
        uses: railwayapp/railway-deploy@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: mc1-api1
          
      - name: Deploy MC1 API 2
        uses: railwayapp/railway-deploy@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: mc1-api2
          
      - name: Deploy MC1 API 3
        uses: railwayapp/railway-deploy@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: mc1-api3
          
      - name: Deploy MC1 Load Balancer
        uses: railwayapp/railway-deploy@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: mc1-lb
          
      - name: Deploy MC2
        uses: railwayapp/railway-deploy@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: mc2
