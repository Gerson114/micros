name: CI

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_API_KEY: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build MC1
        run: |
          cd MC1
          go mod download
          go build -v

      - name: Build MC2
        run: |
          cd MC2
          go mod download
          go build -v

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Deploy MC1 APIs
      - name: Deploy MC1 API 1
        run: |
          cd MC1
          railway up --service mc1-api1 --detach
          cd - >/dev/null

      - name: Deploy MC1 API 2
        run: |
          cd MC1
          railway up --service mc1-api2 --detach
          cd - >/dev/null

      - name: Deploy MC1 API 3
        run: |
          cd MC1
          railway up --service mc1-api3 --detach
          cd - >/dev/null

      - name: Deploy MC1 Load Balancer
        run: |
          cd MC1
          railway up --service mc1-lb --detach
          cd - >/dev/null

      - name: Deploy MC2
        run: |
          cd MC2
          railway up --service mc2 --detach
          cd - >/dev/null