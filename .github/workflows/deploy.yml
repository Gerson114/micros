name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build MC1
        run: |
          cd MC1
          go mod download
          go build -v

      - name: Build MC2
        run: |
          cd MC2
          go mod download
          go build -v

      - name: Deploy MC1
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "❌ RAILWAY_TOKEN não está configurado!"
            exit 1
          fi
          npm i -g @railway/cli
          railway whoami
          cd MC1/api1 && railway up --service api1
          cd ../api2 && railway up --service api2
          cd ../api3 && railway up --service api3

      - name: Deploy MC2
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service mc2 -d MC2
