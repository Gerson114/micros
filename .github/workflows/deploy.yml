name: CI

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build MC1
        run: |
          cd MC1
          go mod download
          go build -v

      - name: Build MC2
        run: |
          cd MC2
          go mod download
          go build -v

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Test Railway Login
        run: |
          RAILWAY_TOKEN=6dcb7a7e-e99b-4340-9117-770288b4226f railway whoami

      - name: Link Railway Project
        run: |
          RAILWAY_TOKEN=6dcb7a7e-e99b-4340-9117-770288b4226f railway link --project 6dcb7a7e-e99b-4340-9117-770288b4226f

      - name: Deploy MC1 API 1
        run: |
          cd MC1
          RAILWAY_TOKEN=6dcb7a7e-e99b-4340-9117-770288b4226f railway up --service mc1-api1

      - name: Deploy MC1 API 2
        run: |
          cd MC1
          RAILWAY_TOKEN=6dcb7a7e-e99b-4340-9117-770288b4226f railway up --service mc1-api2

      - name: Deploy MC1 API 3
        run: |
          cd MC1
          RAILWAY_TOKEN=6dcb7a7e-e99b-4340-9117-770288b4226f railway up --service mc1-api3

      - name: Deploy MC1 Load Balancer
        run: |
          cd MC1/lb
          RAILWAY_TOKEN=6dcb7a7e-e99b-4340-9117-770288b4226f railway up --service mc1-lb

      - name: Deploy MC2
        run: |
          cd MC2
          RAILWAY_TOKEN=6dcb7a7e-e99b-4340-9117-770288b4226f railway up --service mc2