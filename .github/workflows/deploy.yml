name: Deploy Render

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      # Build MC1
      - name: Build MC1
        run: |
          cd MC1
          go mod download
          go build -v

      # Build MC2
      - name: Build MC2
        run: |
          cd MC2
          go mod download
          go build -v

      # Create or Deploy Services
      - name: Create/Deploy MC1 API1
        run: |
          curl -X POST https://api.render.com/v1/services \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "mc1-api1",
              "type": "web_service",
              "repo": "https://github.com/SEU_USUARIO/SEU_REPO",
              "branch": "main",
              "buildCommand": "cd MC1 && go mod download && go build -v",
              "startCommand": "./MC1-api1",
              "envVars": [],
              "plan": "free"
            }'

      - name: Create/Deploy MC1 API2
        run: |
          curl -X POST https://api.render.com/v1/services \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "mc1-api2",
              "type": "web_service",
              "repo": "https://github.com/SEU_USUARIO/SEU_REPO",
              "branch": "main",
              "buildCommand": "cd MC1 && go mod download && go build -v",
              "startCommand": "./MC1-api2",
              "envVars": [],
              "plan": "free"
            }'

      - name: Create/Deploy MC1 API3
        run: |
          curl -X POST https://api.render.com/v1/services \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "mc1-api3",
              "type": "web_service",
              "repo": "https://github.com/SEU_USUARIO/SEU_REPO",
              "branch": "main",
              "buildCommand": "cd MC1 && go mod download && go build -v",
              "startCommand": "./MC1-api3",
              "envVars": [],
              "plan": "free"
            }'

      - name: Create/Deploy MC1 Load Balancer
        run: |
          curl -X POST https://api.render.com/v1/services \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "mc1-lb",
              "type": "web_service",
              "repo": "https://github.com/SEU_USUARIO/SEU_REPO",
              "branch": "main",
              "buildCommand": "cd MC1 && go mod download && go build -v",
              "startCommand": "./MC1-lb",
              "envVars": [],
              "plan": "free"
            }'

      - name: Create/Deploy MC2
        run: |
          curl -X POST https://api.render.com/v1/services \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "mc2",
              "type": "web_service",
              "repo": "https://github.com/SEU_USUARIO/SEU_REPO",
              "branch": "main",
              "buildCommand": "cd MC2 && go mod download && go build -v",
              "startCommand": "./MC2",
              "envVars": [],
              "plan": "free"
            }'