name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build MC1
        run: |
          cd MC1
          go mod download
          go build -v

      - name: Build MC2
        run: |
          cd MC2
          go mod download
          go build -v

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy MC1 API 1
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd MC1
          railway up --service mc1-api1

      - name: Deploy MC1 API 2
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd MC1
          railway up --service mc1-api2

      - name: Deploy MC1 API 3
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd MC1
          railway up --service mc1-api3

      - name: Deploy MC1 Load Balancer
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd MC1/lb
          railway up --service mc1-lb

      - name: Deploy MC2
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd MC2
          railway up --service mc2
