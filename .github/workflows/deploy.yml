name: Deploy Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

    steps:
      # 1️⃣ Pega o código do repositório
      - uses: actions/checkout@v4

      # 2️⃣ Deploy API instance 1
      - name: Deploy API 1
        run: |
          curl -X POST "https://api.render.com/v1/services/api-instance-1/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"

      # 3️⃣ Deploy API instance 2
      - name: Deploy API 2
        run: |
          curl -X POST "https://api.render.com/v1/services/api-instance-2/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"

      # 4️⃣ Deploy API instance 3
      - name: Deploy API 3
        run: |
          curl -X POST "https://api.render.com/v1/services/api-instance-3/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"

      # 5️⃣ Deploy Load Balancer
      - name: Deploy Load Balancer
        run: |
          curl -X POST "https://api.render.com/v1/services/load-balancer/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"
